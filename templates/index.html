{{ define "content" }}
<div class="game-grid">
  {{ range . }}
  <a class="game-link" href="/games/{{.Title}}">
    <div class="game-card">
      <h1 class="game-title">{{.Title}}</h1>
      <span class="">{{.Tagline}}</span>
      <p>Version: {{.Version}}</p>
      <p>{{.GamePath}}</p>
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
